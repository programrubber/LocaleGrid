<svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <!-- 배경 그라데이션 -->
        <linearGradient id="bg" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#0f172a"/>
            <stop offset="100%" stop-color="#1e293b"/>
        </linearGradient>
        <!-- 테두리 그라데이션 -->
        <linearGradient id="border" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#3b82f6"/>
            <stop offset="100%" stop-color="#1d4ed8"/>
        </linearGradient>
    </defs>

    <!-- 바깥 둥근 사각형 배경 -->
    <rect width="40" height="40" rx="8" fill="url(#bg)"/>
    <rect x="0.75" y="0.75" width="38.5" height="38.5" rx="7.25" stroke="url(#border)" stroke-width="1.5" stroke-opacity="0.8"/>

    <!-- 상단 "LocaleGrid" 텍스트 -->
    <text x="20" y="7.5" fill="#ffffff" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-weight="900" font-size="4.2" text-anchor="middle" letter-spacing="0.2">LocaleGrid</text>

    <!-- 에디터 그리드 영역 -->
    <!-- 전체 그리드 아웃라인 -->
    <rect x="5" y="11" width="30" height="24" rx="3" fill="#1e293b" stroke="#3b82f6" stroke-width="1" stroke-opacity="0.6"/>

    <!-- 좌측 'en' 영역 -->
    <rect x="6.5" y="12.5" width="12" height="21" rx="2" fill="#0f172a" fill-opacity="0.5" stroke="#334155" stroke-width="0.75"/>
    <!-- 미니 지구본 -->
    <circle cx="10" cy="17" r="2.2" fill="#10b981" stroke="#ffffff" stroke-width="0.5"/>
    <path d="M8.5 17H11.5M10 15C10.6 15.8 10.6 18.2 10 19" stroke="#ffffff" stroke-width="0.4" stroke-opacity="0.8"/>
    <!-- 'en' 텍스트 -->
    <text x="12.5" y="27" fill="#ffffff" font-family="Consolas,monospace" font-weight="bold" font-size="4.5" text-anchor="middle">'en':</text>

    <!-- 우상 'Hi' 영역 -->
    <rect x="20.5" y="12.5" width="13" height="9.5" rx="2" fill="#2563eb" stroke="#3b82f6" stroke-width="0.75"/>
    <text x="27" y="17.25" fill="#ffffff" font-family="-apple-system,sans-serif" font-weight="bold" font-size="5" text-anchor="middle" dominant-baseline="central">Hi</text>
    <!-- 미니 지구본 아이콘 (우상단) -->
    <circle cx="31.2" cy="15.2" r="1.2" fill="#60a5fa" stroke="#ffffff" stroke-width="0.3"/>

    <!-- 우하 '안녕' 영역 -->
    <rect x="20.5" y="24" width="13" height="9.5" rx="2" fill="#eab308" stroke="#facc15" stroke-width="0.75"/>
    <text x="27" y="28.75" fill="#000000" font-family="-apple-system,Noto Sans KR,sans-serif" font-weight="bold" font-size="4.2" text-anchor="middle" dominant-baseline="central">안녕</text>
    <!-- 미니 지구본 아이콘 (우상단) -->
    <circle cx="31.2" cy="26.7" r="1.2" fill="#eab308" stroke="#000000" stroke-width="0.3"/>
</svg>
